# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "FoodbookApp"

[setup]
script = ""

[setup.win32]
script = '''
@echo off
setlocal EnableDelayedExpansion

:: ============================================================
::  setup_dotnet.cmd
::  Instaluje .NET 9 SDK na Windows i weryfikuje srodowisko
::  Uzycie: setup_dotnet.cmd
:: ============================================================

echo.
echo ===================================================
echo   Instalator .NET 9 SDK dla srodowiska Codex
echo ===================================================
echo.

:: --- Sprawdz czy .NET 9 jest juz zainstalowany ---
dotnet --list-sdks 2>nul | findstr /B "9\." >nul 2>&1
if %ERRORLEVEL% == 0 (
    echo [OK] .NET 9 SDK jest juz zainstalowany:
    dotnet --list-sdks | findstr /B "9\."
    goto :verify
)

echo [INFO] .NET 9 SDK nie znaleziono. Rozpoczynam instalacje...
echo.

:: --- Pobierz skrypt instalacyjny Microsoftu ---
set "INSTALL_SCRIPT=%TEMP%\dotnet-install.ps1"
set "DOTNET_VERSION=9.0"
set "INSTALL_DIR=%LOCALAPPDATA%\Microsoft\dotnet"

echo [1/3] Pobieranie skryptu instalacyjnego...
powershell -NoProfile -ExecutionPolicy Bypass -Command ^
  "Invoke-WebRequest -Uri 'https://dot.net/v1/dotnet-install.ps1' -OutFile '%INSTALL_SCRIPT%'"

if %ERRORLEVEL% NEQ 0 (
    echo [BLAD] Nie udalo sie pobrac skryptu instalacyjnego.
    echo        Sprawdz polaczenie z internetem i sprobuj ponownie.
    exit /b 1
)

echo [2/3] Instalowanie .NET %DOTNET_VERSION% SDK...
powershell -NoProfile -ExecutionPolicy Bypass -Command ^
  "& '%INSTALL_SCRIPT%' -Channel '%DOTNET_VERSION%' -InstallDir '%INSTALL_DIR%'"

if %ERRORLEVEL% NEQ 0 (
    echo [BLAD] Instalacja .NET %DOTNET_VERSION% nie powiodla sie.
    exit /b 1
)

:: --- Dodaj dotnet do PATH dla biezacej sesji ---
echo [3/3] Aktualizowanie PATH...
set "PATH=%INSTALL_DIR%;%PATH%"

:: Trwale dodaj do PATH uzytkownika (jesli jeszcze nie ma)
echo %PATH% | findstr /I /C:"%INSTALL_DIR%" >nul 2>&1
if %ERRORLEVEL% NEQ 0 (
    powershell -NoProfile -ExecutionPolicy Bypass -Command ^
      "[Environment]::SetEnvironmentVariable('PATH', '%INSTALL_DIR%;' + [Environment]::GetEnvironmentVariable('PATH','User'), 'User')"
    echo [OK] Dodano '%INSTALL_DIR%' do PATH uzytkownika.
) else (
    echo [OK] PATH juz zawiera katalog .NET.
)

del /f /q "%INSTALL_SCRIPT%" >nul 2>&1

:: ============================================================
:verify
:: ============================================================
echo.
echo ---------------------------------------------------
echo  Weryfikacja instalacji
echo ---------------------------------------------------

dotnet --version >nul 2>&1
if %ERRORLEVEL% NEQ 0 (
    echo [BLAD] Komenda 'dotnet' niedostepna. Uruchom ponownie terminal.
    exit /b 1
)

echo [OK] Wersja .NET SDK:
dotnet --version

echo.
echo [OK] Zainstalowane SDK:
dotnet --list-sdks

echo.
echo [OK] Zainstalowane runtime:
dotnet --list-runtimes

:: ============================================================
:: Test: kompilacja i uruchomienie prostej aplikacji
:: ============================================================
echo.
echo ---------------------------------------------------
echo  Test kompilacji i uruchomienia
echo ---------------------------------------------------

set "TEST_DIR=%TEMP%\codex_dotnet_test_%RANDOM%"
mkdir "%TEST_DIR%" >nul 2>&1

echo [TEST] Tworzenie projektu testowego w: %TEST_DIR%
dotnet new console -n CodexTest --framework net9.0 -o "%TEST_DIR%" --force >nul 2>&1

if %ERRORLEVEL% NEQ 0 (
    echo [BLAD] Nie udalo sie utworzyc projektu testowego.
    goto :cleanup
)

echo [TEST] Kompilacja projektu (dotnet build)...
dotnet build "%TEST_DIR%" --configuration Release --nologo -v q
if %ERRORLEVEL% NEQ 0 (
    echo [BLAD] Kompilacja nie powiodla sie.
    goto :cleanup
) else (
    echo [OK]   Kompilacja zakonczona sukcesem.
)

echo [TEST] Uruchomienie aplikacji (dotnet run)...
dotnet run --project "%TEST_DIR%" --configuration Release --nologo
if %ERRORLEVEL% NEQ 0 (
    echo [BLAD] Uruchomienie nie powiodlo sie.
    goto :cleanup
) else (
    echo [OK]   Aplikacja uruchomiona poprawnie.
)

:: ============================================================
:: Test: xUnit
:: ============================================================
echo.
echo ---------------------------------------------------
echo  Test frameworka testowego (xUnit)
echo ---------------------------------------------------

set "XUNIT_DIR=%TEMP%\codex_xunit_test_%RANDOM%"

echo [TEST] Tworzenie projektu xUnit w: %XUNIT_DIR%
dotnet new xunit -n CodexXUnitTest --framework net9.0 -o "%XUNIT_DIR%" --force >nul 2>&1

if %ERRORLEVEL% NEQ 0 (
    echo [BLAD] Nie udalo sie utworzyc projektu xUnit.
    goto :cleanup
)

echo [TEST] Uruchomienie testow (dotnet test)...
dotnet test "%XUNIT_DIR%" --configuration Release --nologo -v n
if %ERRORLEVEL% NEQ 0 (
    echo [BLAD] Testy nie powiodly sie.
    goto :cleanup
) else (
    echo [OK]   Testy zakonczone sukcesem.
)

:cleanup
echo.
echo [INFO] Sprzatanie katalogow tymczasowych...
if exist "%TEST_DIR%" rmdir /s /q "%TEST_DIR%"
if exist "%XUNIT_DIR%" rmdir /s /q "%XUNIT_DIR%"

:: ============================================================
echo.
echo ===================================================
echo   Srodowisko .NET 9 gotowe do uzycia w Codex!
echo.
echo   Podstawowe komendy:
echo     dotnet new console -n MojaAplikacja
echo     dotnet new webapi   -n MojeAPI
echo     dotnet new xunit    -n MojeTesty
echo     dotnet build
echo     dotnet run
echo     dotnet test
echo     dotnet publish -c Release
echo ===================================================
echo.
endlocal
'''
